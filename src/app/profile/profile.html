<div class="container mt-5">
    <div class="row">
      <div class="col-lg-4">
        <div class="card mb-4 text-center">
          <div class="card-body">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUybTM4dmZzODl6ZTF0YXZ0dGFvejRkZjJ6cXdsbmV3ZDgzbnVqdXB4ZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/901mxGLGQN2PyCQpoc/giphy.gif" 
                 alt="avatar" class="rounded-circle img-fluid" style="width: 150px;">
            <h5 class="my-3">{{ user.firstName }} {{ user.lastName }}</h5>
            <p class="text-muted mb-1">{{ user.jobTitle }}</p>
            <p class="text-muted mb-4">{{ user.location }}</p>
            <div class="d-flex justify-content-center mb-2">
              <button type="button" class="btn btn-primary">Follow</button>
              <button type="button" class="btn btn-outline-primary ms-1">Message</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-body">
            <div class="row">
              <div class="col-sm-3"><p class="mb-0">Full Name</p></div>
              <div class="col-sm-9"><p class="text-muted mb-0">{{ user.firstName }} {{ user.lastName }}</p></div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-3"><p class="mb-0">Email</p></div>
              <div class="col-sm-9"><p class="text-muted mb-0">{{ user.email }}</p></div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-3"><p class="mb-0">Phone</p></div>
              <div class="col-sm-9"><p class="text-muted mb-0">{{ user.phone }}</p></div>
            </div>
            <hr>
            <div class="row">
              <div class="col-sm-3"><p class="mb-0">Bio</p></div>
              <div class="col-sm-9"><p class="text-muted mb-0">{{ user.bio }}</p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
